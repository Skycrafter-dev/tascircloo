<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
		<title>CircloO TAS Game Runtime</title>
		<link rel="stylesheet" href="/game/css/style.css" />
		<style>
			html,
			body {
				width: 100%;
				height: 100%;
				margin: 0;
				overflow: hidden;
				background: #050505;
			}

			.gm4html5_div_class {
				width: 100%;
				height: 100%;
				display: grid;
				place-items: center;
			}

			canvas {
				width: min(100vw, calc(100vh * 1.6));
				height: min(100vh, calc(100vw / 1.6));
				image-rendering: auto;
				-webkit-interpolation-mode: bicubic;
				touch-action: none;
				outline: none;
			}

			canvas:focus,
			canvas:focus-visible {
				outline: none;
			}
		</style>
		<script src="/game/html5game_a5/tph_html5fixes3.js?v=1"></script>
		<script src="/game/html5game_a5/uph_quickTextRender.js?v=1"></script>
		<script src="/game/html5game_a5/vph_HTML5Link.js?v=1"></script>
		<script src="/game/tas-bridge.js?v=56"></script>
	</head>
	<body>
		<div class="gm4html5_div_class" id="gm4html5_div_id">
			<canvas id="canvas" width="960" height="600">
				<p>Your browser does not support HTML5 canvas.</p>
			</canvas>
		</div>

		<script src="/game/html5game_a5/circloo.js?v=10"></script>
		<script>
			window.onload = GameMaker_Init;
		</script>
	</body>
</html>
